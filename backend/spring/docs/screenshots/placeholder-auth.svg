<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-label="Auth flow placeholder">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <style>
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .title { font: 600 20px Inter, Arial, sans-serif; fill: #0f172a; }
      .text { font: 500 16px Inter, Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .note { font: 500 14px Inter, Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="#64748b" />
    </marker>
  </defs>
  <rect width="900" height="560" fill="url(#bg)"/>

  <text x="40" y="60" class="title">Auth Flow</text>

  <rect x="60" y="110" width="240" height="70" class="box" />
  <text x="80" y="150" class="text">Login (username/pass)</text>

  <rect x="340" y="110" width="240" height="70" class="box" />
  <text x="360" y="150" class="text">Access + Refresh Tokens</text>

  <rect x="620" y="110" width="220" height="70" class="box" />
  <text x="640" y="150" class="text">API Requests</text>

  <rect x="340" y="250" width="240" height="70" class="box" />
  <text x="360" y="290" class="text">Access Token Expired</text>

  <rect x="340" y="360" width="240" height="70" class="box" />
  <text x="360" y="400" class="text">Refresh /auth/refresh</text>

  <rect x="620" y="360" width="220" height="70" class="box" />
  <text x="640" y="400" class="text">New Access Token</text>

  <path d="M300 145 L330 145" class="arrow" />
  <path d="M580 145 L610 145" class="arrow" />
  <path d="M730 180 L730 300 L580 300" class="arrow" />
  <path d="M460 320 L460 350" class="arrow" />
  <path d="M580 395 L610 395" class="arrow" />
  <path d="M780 360 L780 180" class="arrow" />

  <text x="620" y="320" class="note">401 → refresh</text>
</svg>
